name: Sync music page to awen-site

on:
  push:
    branches: [main]
    paths: [docs/index.html]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product-awen-music
        uses: actions/checkout@v4

      - name: Setup SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Clone awen-site and sync
        run: |
          set -e
          git clone git@github.com:awenstudio/awenstudio.github.io.git awen-site
          mkdir -p awen-site/music
          cp docs/index.html awen-site/music/index.html
          cd awen-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to sync"
          else
            git add music/index.html
            git commit -m "sync: update music page from product-awen-music"
            git push
          fi
