name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check all JSX sources
        run: |
          for f in src/*.jsx; do
            echo "checking $f"
            npx --yes esbuild "$f" --loader:.jsx=jsx --outfile=/dev/null
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build docs/index.html
        run: python3 build.py

      - name: Verify build output
        run: test -f docs/index.html && echo "✅ $(wc -c < docs/index.html) bytes"
