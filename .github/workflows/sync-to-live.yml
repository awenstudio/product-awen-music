name: Sync Music to Live

on:
  push:
    branches: [main]
    paths:
      - 'docs/index.html'
      - '.github/workflows/sync-to-live.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync docs/index.html to awenstudio.github.io
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          echo "Checking if SYNC_TOKEN is set..."
          if [ -z "$TOKEN" ]; then
            echo "❌ SYNC_TOKEN not found in secrets!"
            exit 1
          fi
          echo "✅ Token found"

          echo "Cloning target repo..."
          git clone https://x-access-token:${TOKEN}@github.com/awenstudio/awenstudio.github.io.git target-repo 2>&1 | head -20

          echo "Copying docs/index.html..."
          cp docs/index.html target-repo/music/index.html

          echo "Configuring git in target repo..."
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Staging changes..."
          git add music/index.html

          echo "Checking diff..."
          git diff --cached --stat

          if ! git diff --cached --quiet; then
            echo "Committing..."
            git commit -m "sync: update music/index.html from awen-music

Auto-synced from awen-music docs/index.html
$(git -C .. log -1 --pretty=format:%H)"
            echo "Pushing..."
            git push origin main
            echo "✅ Sync completed successfully"
          else
            echo "ℹ️  No changes to sync"
          fi
