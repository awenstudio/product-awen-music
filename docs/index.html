    box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),
    0 2px 6px rgba(0,0,0,.15)}
  .twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;
    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip>span>i:first-child{box-shadow:none}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">
/* Awen Study — UI components. Loaded as Babel JSX. Exports to window. */
const { useState, useRef, useEffect } = React;

/* ---------- tiny inline icons (kept geometric, no hand-drawn art) ---------- */
function Icon({ name, size = 16 }) {
  const s = { width: size, height: size, strokeWidth: 1.6, fill: 'none',
              stroke: 'currentColor', strokeLinecap: 'round', strokeLinejoin: 'round' };
  const paths = {
    lock:   <><rect x="4" y="9" width="12" height="9" rx="1.5" /><path d="M6.5 9V6.5a3.5 3.5 0 0 1 7 0V9" /></>,
    unlock: <><rect x="4" y="9" width="12" height="9" rx="1.5" /><path d="M6.5 9V6.5a3.5 3.5 0 0 1 6.8-1.2" /></>,
    dice:   <><rect x="3" y="3" width="14" height="14" rx="3" /><circle cx="7" cy="7" r="1.1" fill="currentColor" stroke="none"/><circle cx="13" cy="13" r="1.1" fill="currentColor" stroke="none"/><circle cx="10" cy="10" r="1.1" fill="currentColor" stroke="none"/></>,
    bolt:   <path d="M11 2 4 11h5l-1 7 7-9h-5z" />,
    copy:   <><rect x="6" y="6" width="10" height="11" rx="1.6" /><path d="M12 6V4.6A1.6 1.6 0 0 0 10.4 3H4.6A1.6 1.6 0 0 0 3 4.6v7A1.6 1.6 0 0 0 4.6 13H6" /></>,
    check:  <path d="M4 10.5 8 14.5 16 5.5" />,
    reset:  <><path d="M4 10a6 6 0 1 1 1.8 4.3" /><path d="M4 14v-3.2h3.2" /></>,
    wave:   <path d="M2 10c2 0 2-4 4-4s2 8 4 8 2-8 4-8 2 4 4 4" />,
    play:   <path d="M6 4l9 6-9 6z" fill="currentColor" stroke="none" />,
    image:  <><rect x="3" y="4" width="14" height="12" rx="2" /><circle cx="7.4" cy="8" r="1.3" /><path d="M3.5 14l4-3.4 3 2.4 3.2-3 2.8 2.6" /></>,
  };
  return <svg viewBox="0 0 20 20" style={s} aria-hidden="true">{paths[name]}</svg>;
}

/* ---------- a single selectable cell ---------- */
function Chip({ label, selected, fromRef, onClick, swatch }) {
  return (
    <button type="button"
      className={'chip' + (selected ? ' sel' : '') + (fromRef && !selected ? ' ref' : '')}
      onClick={onClick}>
      {swatch
        ? <span className="chip-swatch" style={{ background: `linear-gradient(135deg, ${swatch.join(', ')})` }} />
        : <span className="chip-dot" />}
      <span className="chip-label">{label}</span>
      {selected && <span className="chip-check"><Icon name="check" size={13} /></span>}
    </button>
  );
}

/* ---------- one dimension column ---------- */
function Column({ dim, value, onPick, showLock, locked, onToggleLock, refValue }) {
  const layerClass = dim.layer === 'production' ? ' col-prod' : (dim.layer === 'visual' ? ' col-visual' : '');
  const hex = window.AWEN.PALETTE_HEX;
  return (
    <div className={'col' + layerClass}>
      <div className="col-head">
        <div className="col-headL">
          <span className="col-code">{dim.code}</span>
          <span className="col-label">{window.I18N.isZh() ? (dim.zh || dim.label) : dim.label}</span>
        </div>
        {showLock && (
          <button type="button"
            className={'col-lock' + (locked ? ' on' : '')}
            title={locked ? '已锁定 — Shuffle 时保持不动\n点击解锁' : '未锁定 — Shuffle 时会随机替换\n点击锁定'}
            onClick={onToggleLock}>
            <Icon name={locked ? 'lock' : 'unlock'} size={14} />
          </button>
        )}
      </div>
      <div className="col-body">
        {dim.options.map(opt => (
          <Chip key={opt} label={opt} selected={value === opt}
            swatch={dim.key === 'palette' ? hex[opt] : null}
            fromRef={refValue === opt} onClick={() => onPick(dim.key, opt)} />
        ))}
      </div>
    </div>
  );
}

/* ---------- BPM is a stepped range, not a list ---------- */
function BpmColumn({ bpm, value, onPick, showLock, locked, onToggleLock }) {
  return (
    <div className="col col-prod col-bpm">
      <div className="col-head">
        <div className="col-headL">
          <span className="col-code">{bpm.code}</span>
          <span className="col-label">{T('tempo')}</span>
        </div>
        {showLock && (
          <button type="button" className={'col-lock' + (locked ? ' on' : '')}
            onClick={onToggleLock} title={locked ? 'Locked' : 'Unlocked'}>
            <Icon name={locked ? 'lock' : 'unlock'} size={14} />
          </button>
        )}
      </div>
      <div className="col-body bpm-body">
        <div className="bpm-read"><span className="bpm-num">{value}</span><span className="bpm-unit">bpm</span></div>
        <div className="bpm-grid">
          {bpm.values.map(v => (
            <button key={v} type="button"
              className={'bpm-opt' + (value === v ? ' sel' : '')}
              onClick={() => onPick('bpm', v)}>{v}</button>
          ))}
        </div>
        <div className="bpm-note">{T('brandRange')}</div>
      </div>
    </div>
  );
}

/* ---------- striped image placeholder ---------- */
function Placeholder({ label, ratio = '1 / 1' }) {
  return <div className="ph" style={{ aspectRatio: ratio }}><span className="ph-tag">{label}</span></div>;
}

/* ---------- reference (imported lo-fi) card, shown in Decompose mode ---------- */
function ReferenceCard({ sample, sel, onApply, onReset, onParse }) {
  const A = window.AWEN;
  const muts = A.mutations(sel);
  const [paste, setPaste] = React.useState('');
  const [parseHint, setParseHint] = React.useState('');

  function handleParse() {
    const result = A.parseStyleString(paste);
    if (!result || Object.keys(result).length === 0) {
      setParseHint('未识别到任何标签 — 试试粘贴 Suno 风格框内容');
      return;
    }
    onParse(result);
    setParseHint(`✔ 识别到 ${Object.keys(result).length} 个维度并已填入矩阵`);
    setTimeout(() => setParseHint(''), 2800);
  }

  return (
    <div className="refcard">
      <Placeholder label="cover art" />
      <div className="refcard-body">
        <div className="refcard-kicker">PASTE A SUNO STYLE STRING</div>
        <div className="refcard-paste-row">
          <input className="refcard-paste-input" value={paste}
            onChange={e => setPaste(e.target.value)}
            placeholder="粘贴风格框内容 e.g. Ambient, calm lo-fi, felt piano, 60 bpm, warm tape saturation, rain, night"
            onKeyDown={e => e.key === 'Enter' && handleParse()} />
          <button type="button" className="btn btn-primary sm" onClick={handleParse} disabled={!paste.trim()}>
            <Icon name="reset" size={14} /> 反推
          </button>
        </div>
        {parseHint && <div className="refcard-parse-hint">{parseHint}</div>}

        <div className="refcard-kicker" style={{marginTop:14}}>OR START FROM REF</div>
        <div className="refcard-title">{sample.label}</div>
        <div className="refcard-sub">{sample.source} · {sample.id.slice(0, 10)}… — {sample.sub}</div>
        <div className="refcard-chips">
          {Object.entries(sample.decomposed).map(([k, v]) => (
            <span key={k} className="refchip"><b>{(A.DIMS.find(d => d.key === k)?.code) || 'BPM'}</b>{v}</span>
          ))}
        </div>
        <div className="refcard-actions">
          <button type="button" className="btn btn-ghost sm" onClick={onReset}>
            <Icon name="reset" size={14} /> Reset to source
          </button>
          <div className="refcard-diff">
            {muts === 0 ? 'identical to source' : `${muts} mutation${muts > 1 ? 's' : ''} from source`}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- robust clipboard copy: works inside sandboxed iframes too ---------- */
async function copyText(text) {
  // 1) modern API (needs secure context + permission — often blocked in embedded preview)
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) { /* fall through */ }
  // 2) legacy execCommand via a temporary textarea
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.top = '0';
    ta.style.left = '0';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}

/* ---------- tooltip component ---------- */
function Tooltip({ text, children }) {
  const [show, setShow] = React.useState(false);
  return (
    <span className="tip-wrap"
      onMouseEnter={() => setShow(true)}
      onMouseLeave={() => setShow(false)}>
      {children}
      {show && text && <span className="tip-box">{text}</span>}
    </span>
  );
}

/* ---------- copy-to-clipboard button ---------- */
function CopyBtn({ text, label }) {
  const [state, setState] = useState('idle'); // idle | done | fail
  return (
    <button type="button" className={'copy' + (state === 'done' ? ' done' : '') + (state === 'fail' ? ' fail' : '')}
      onClick={async () => {
        const ok = await copyText(text);
        setState(ok ? 'done' : 'fail');
        setTimeout(() => setState('idle'), 1700);
      }}>
      <Icon name={state === 'done' ? 'check' : 'copy'} size={13} />
      {state === 'done' ? T('copied') : state === 'fail' ? T('copyFail') : (label || T('copy'))}
    </button>
  );
}

Object.assign(window, { Icon, Chip, Column, BpmColumn, Placeholder, ReferenceCard, CopyBtn });

</script>

  if (!intro) return null;

    const next = { ...dismissed, [mode]: true };
    setDismissed(next);
    try { localStorage.setItem(TAB_INTRO_DISMISS_KEY, JSON.stringify(next)); } catch (e) {}
  }

    const next = { ...dismissed }; delete next[mode];

  const [sel, setSel] = React.useState(saved?.sel ? { ...A.DEFAULTS, ...saved.sel } : { ...A.DEFAULTS });

  // persist
  // PERF: debounce localStorage writes — at most one write per 400ms, instead of
  // serializing the entire app state on every keystroke / status cycle / etc.
  const _writeTimer = React.useRef(null);
  React.useEffect(() => {
    if (_writeTimer.current) clearTimeout(_writeTimer.current);
    _writeTimer.current = setTimeout(() => {
      const clean = songs.filter((s) => !s.generating);
      const cleanAlb = albums.filter((a) => !a.generating);

    }, 400);
    return () => { if (_writeTimer.current) clearTimeout(_writeTimer.current); };
  }, [mode, sel, locks, songs, albums, seq, albumSeq, axisKey, trackCount, lang]);

  // AI proxy — points to Cloudflare Worker; update WORKER_URL after deploy
  const WORKER_URL = 'https://awen-music-api.ywhang1995.workers.dev';
  const API_TIMEOUT_MS = 30000;

  // Safe localStorage wrappers — Safari private mode / quota errors will not crash the app.
  const safeLS = {
    get(k){ try { return localStorage.getItem(k); } catch(e) { return null; } },

  // Token is now requested via a React modal (setRequestToken in App), set asynchronously.
  // The promise is resolved when the user submits the modal.
  let _tokenResolver = null;
  function requestTokenViaModal() {
    return new Promise((resolve) => {
      _tokenResolver = resolve;
      window.dispatchEvent(new CustomEvent('awen-need-token'));
    });
  }
  function resolveToken(token) {
    if (_tokenResolver) { _tokenResolver(token); _tokenResolver = null; }
  }
  window.__awen_resolveToken = resolveToken;

  async function getAccessToken() {
    let token = safeLS.get('awen_music_token');
    if (!token) {
      token = await requestTokenViaModal();
      if (token) safeLS.set('awen_music_token', token.trim());
    }
    return token || '';
  }

  async function complete(prompt) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), API_TIMEOUT_MS);
    try {
      const token = await getAccessToken();
      if (!token) throw new Error(T('aiNeedToken'));
      const r = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Access-Token': token },
        body: JSON.stringify({ prompt }),
        signal: ctrl.signal,
      });
      if (r.status === 401) {
        safeLS.del('awen_music_token');
        throw new Error(T('aiBadToken'));
      }
      if (!r.ok) throw new Error('worker ' + r.status);
      const { text } = await r.json();
      return text;
    } catch (e) {
      if (e.name === 'AbortError') throw new Error(T('aiTimeout'));
      throw e;
    } finally {
      clearTimeout(t);
    }
  }

  async function callAI(s) {
    const prompt =
    `You are the prompt engine for "Awen Study", a lo-fi study-music content factory run by awen yang.
Given a song RECIPE (one value per matrix dimension), write production-ready prompts.

RECIPE
- Environment: ${s.environment}
- Nature: ${s.nature}
- Time: ${s.time}
- Mood: ${s.mood}
- Instrument: ${s.instrument}
- Style: ${s.style}
- BPM: ${s.bpm}
VISUAL IDENTITY (keep recognizable across all Awen output)
- Character: ${s.character}
- Light Source: ${s.light}
- Color Palette: ${s.palette}
- Narrative Motif: ${s.motif}

STYLE BOX RULES (Suno v5 best practice):
- Describe groove + texture FIRST, not emotion. Groove = "slow unhurried groove" / "relaxed head-nodding groove". Texture = vinyl crackle / tape hiss / room reverb.
- Pin a MUSICAL KEY + MODE (e.g. "A minor", "D dorian", "F lydian") — this is the single biggest fix for incoherence.
- Lead instrument ONLY + max 2 support instruments. Restraint = authentic lo-fi. Never stack 4+ instruments.
- Avoid words: "crisp", "polished", "clean", "hi-fi" — these are antonyms of lo-fi.
- Cap at 150 chars.

ARRANGEMENT RULES (goes in Suno's Lyrics box — gives the track an arc):
- Write a 5-section metatag structure: [Intro] → [Main] → [Lift] → [Breakdown] → [Outro]
- Each section on its own line in format: [Section: what happens here, texture, energy]
- Outro MUST return to opening motif and fade

Return ONLY minified JSON (no markdown) with EXACTLY this shape:
{"title":"evocative 2-5 word Title Case song name","tagline":"3-6 word mood tagline lowercase","suno":{"key":"musical key + mode (e.g. A minor, D dorian, F lydian)","style":"groove+texture first; key; BPM; 1 lead + max 2 support; tape/vinyl texture; instrumental — MAX 150 chars","structure":"5-line metatag arrangement for Suno Lyrics box, one section per line, [Intro]→[Main]→[Lift]→[Breakdown]→[Outro]","prompt":"ONE short sentence for notes/reference","exclude":"comma-separated exclusions, always include: vocals, lyrics, crisp, polished"},"cover":"square 1:1 cover-art prompt: Character + Environment + Motif + Light + Palette + camera + mood; Awen signatures (open book, warm lamp, wood, cozy); centered, negative space near top for title; no text, no logos, no motion","video":"16:9 looping video: motif in slow motion, same light + palette, dust drift, slow cinematic drift, shallow DOF, seamless loop, no people","thumb":"YouTube 1280×720 consistency rules: same palette + lamp + open book every time, Awen wordmark lower-left, same title type top-left"}
No vocals, no variation. The cover / video / thumbnail MUST share the same visual identity.`;
    const raw = await complete(prompt);
    const a = raw.indexOf('{'),b = raw.lastIndexOf('}');
    if (a < 0 || b < 0) throw new Error('no json');
    const j = JSON.parse(raw.slice(a, b + 1));
    if (!j.title || !j.suno || !j.suno.prompt || !(j.cover || j.video)) throw new Error('bad shape');
    return {
      title: String(j.title).slice(0, 60),
      tagline: j.tagline ? String(j.tagline) : `${s.mood.toLowerCase()} · ${s.time.toLowerCase()}`,
      suno: {
        key: String(j.suno.key || A.musicalKey(s.mood)),
        style: String(j.suno.style || ''),
        structure: String(j.suno.structure || A.buildArrangement(s)),
        prompt: String(j.suno.prompt),
        exclude: String(j.suno.exclude || 'vocals, lyrics, crisp, polished')
      },
      cover: String(j.cover || ''),
      video: String(j.video || j.veo || ''),
      thumb: String(j.thumb || A.thumbRules(s))
    };
  }

  async function generate() {

    null;

  // ---- album generation: one AI call returns the whole coherent album ----
  async function callAlbumAI(axis, base, recipes) {
    const lines = recipes.map((s, i) => {
      const role = A.trackRole(i, recipes.length);
      return `${i + 1}. env=${s.environment}; nature=${s.nature}; time=${s.time}; mood=${s.mood}; inst=${s.instrument}; style=${s.style}; bpm=${s.bpm}; role=${role.name} (${role.mod})`;
    }).join('\n');
    const prompt =
    `You are the album engine for "Awen Study", a lo-fi study-music label by awen yang.
Design ONE coherent instrumental album. All tracks share a fixed sonic identity; only the "${axis.label}" axis progresses across them (${axis.moves.join(' + ')}).

FIXED VISUAL IDENTITY (held constant — every cover/video/thumbnail must inherit this so the album reads as one Awen world):
- Character: ${base.character}
- Light Source: ${base.light}
- Color Palette: ${base.palette}
- Narrative Motif: ${base.motif}

ALBUM DNA (these four elements must be woven into every track description and the album liner note):
- Core Motif: ${A.albumDNA(base).motif}
- Core Texture: ${A.albumDNA(base).texture}
- Core Space: ${A.albumDNA(base).space}
- Core Emotion: ${A.albumDNA(base).emotion}

CORE MELODIC MOTIF (recurs across the album for cohesion):
- ${A.coreMotif(base.instrument)}
- Track 1: introduce it clearly in the opening bars
- Track ${Math.floor(recipes.length/2)+1}: subtle variation (different register or harmony)
- Track ${recipes.length}: return it resolved, near-silent dynamics

TRACKS (one recipe per line):
${lines}

Return ONLY minified JSON, no markdown, EXACTLY:
{"album":"evocative 2-4 word album title (Title Case)","concept":"one-line concept under 90 chars","description":"a 2-3 sentence liner note: the inspiration/source behind the album, the journey it traces, and what kind of tracks it gathers; reference the opening and closing track feel","description_zh":"the SAME liner note written naturally in fluent simplified Chinese (简体中文)","anchor":"a single shared Suno style string (under 150 chars) reused on every track; MUST include a production/texture layer (warm tape saturation, vinyl crackle, drum treatment or 'no drums', room reverb, low-pass) so timbre stays consistent","cover":"square 1:1 cover-art prompt built as Character + Environment + Motif + Light + Palette + camera + mood, weaving the Awen signature elements (open book, warm lamp, wood, cozy atmosphere); centered, negative space near the top for the album title; no text, no logos, no motion words","video":"16:9 looping background-video prompt: the motif in slow motion, same light + palette, dust drift, slow cinematic camera drift, shallow depth of field, seamless loop, no people","thumb":"YouTube thumbnail (1280×720) consistency rules: same palette, same lamp, same open book, Awen wordmark lower-left, same title type top-left","coreMotif":"the four-note motif phrase","dna":{"motif":"","texture":"","space":"","emotion":""},"tracks":[{"title":"evocative 2-4 word track title","scene":"2-4 word scene label","role":"track role name","key":"musical key + mode for THIS track","style":"groove+texture; key; BPM; lead+max 2 support; instrumental — MAX 150 chars","structure":"5-line metatag arrangement for THIS track's Lyrics box","motifMark":"intro|variation|return|null","prompt":"one-sentence reference note for this track"}]}
The tracks array MUST have exactly ${recipes.length} items, in order. Everything calm, warm, instrumental, study-friendly, no vocals.`;
    const raw = await complete(prompt);
    const a = raw.indexOf('{'),b = raw.lastIndexOf('}');
    if (a < 0 || b < 0) throw new Error('no json');
    const j = JSON.parse(raw.slice(a, b + 1));
    if (!j.album || !Array.isArray(j.tracks) || j.tracks.length !== recipes.length) throw new Error('bad shape');
    return {
      album: String(j.album).slice(0, 60),
      concept: String(j.concept || ''),
      description: String(j.description || ''),
      descriptionZh: String(j.description_zh || ''),
      anchor: String(j.anchor || ''),
      coreMotif: String(j.coreMotif || A.coreMotif(base.instrument)),
      dna: j.dna || A.albumDNA(base),
      visual: A.visualDNA(base),
      cover: String(j.cover || ''),
      video: String(j.video || ''),
      thumb: String(j.thumb || A.thumbRules(base)),
      tracks: j.tracks.map((t, i) => ({
        title: String(t.title || `Track ${i + 1}`),
        scene: String(t.scene || `${recipes[i]?.time} · ${recipes[i]?.environment}`),
        role: String(t.role || ''),
        key: String(t.key || A.musicalKey(recipes[i]?.mood || 'Calm')),
        style: String(t.style || ''),
        structure: String(t.structure || A.buildArrangement(recipes[i] || {}, t.role || '')),
        motifMark: t.motifMark === 'null' ? null : (t.motifMark || null),
        prompt: String(t.prompt || '')
      }))
    };
  }

      })()}

      {/* production feed */}
      {mode === 'album' ?
      <div className="feed">
          <div className="feed-head">
            <span className="feed-title">{T('albumShelf')}</span>
            {albums.length > 0 &&
          <button type="button" className="feed-clear" onClick={() => setAlbums((prev) => prev.filter((a) => a.pinned))}>{T('clearAll')}</button>
          }
          </div>
          {albums.length === 0 ?
        <div className="empty">
              <Icon name="wave" size={22} />
              <p>{T('emptyAlbum')}</p>
            </div> :

        <div className="albshelf">
              {albums.map((a) =>
          <AlbumCard key={a.id} album={a} onStatus={setAlbumStatus} onDelete={removeAlbum} onPin={setPinAlbum} />
          )}
            </div>
        }
        </div> :

      <div className="feed">
          <div className="feed-head">
            <span className="feed-title">{T('prodFeed')}</span>
            {songs.length > 0 &&
          <button type="button" className="feed-clear" onClick={() => setSongs((prev) => prev.filter((s) => s.pinned))}>{T('clearAll')}</button>
          }
          </div>
          {songs.length === 0 ?
        <div className="empty">
              <Icon name="wave" size={22} />
              <p>{T('emptySong')}</p>
            </div> :

        <div className="feed-list">
              {songs.map((s) =>
          <SongCard key={s.id} song={s} onStatus={setStatus} onDelete={removeSong} onPin={setPinSong} onRemix={remixSong} />
          )}
            </div>
        }
        </div>
      }

      {/* Tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Look" />
        <TweakRadio label="Theme" value={t.theme}
        options={['console', 'lofi', 'clean', 'studio']}
        onChange={(v) => setTweak('theme', v)} />
        <TweakRadio label="Density" value={t.density}
        options={['compact', 'regular']}
        onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Engine" />
        <TweakToggle label="AI prompt generation" value={t.useAI}
        onChange={(v) => setTweak('useAI', v)} />
      </TweaksPanel>
      <Guide open={showGuide} onClose={() => setShowGuide(false)} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
