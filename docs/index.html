<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Awen Study — Matrix Generator</title>
<meta name="description" content="Awen Music Matrix — a lo-fi study music generator that produces Suno style boxes, cover art prompts, video prompts, YouTube metadata, and a coherent Awen visual identity across every album.">
<meta property="og:title" content="Awen Music Matrix" />
<meta property="og:description" content="Lo-fi study music prompt factory — Suno + cover + video + YouTube metadata, all coherent under one Awen universe." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://hiawen.com/music/" />
<meta name="twitter:card" content="summary" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2315171a'/><rect x='30' y='30' width='40' height='40' rx='6' fill='none' stroke='%237fd4c9' stroke-width='4'/><circle cx='50' cy='50' r='7' fill='%237fd4c9'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================ THEMES ============================ */
  .app{
    --font-ui:'Hanken Grotesk',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
    --radius:14px;
    --pad:22px; --gap:14px; --chip-h:34px; --board-h:360px;
  }
  .app[data-density="compact"]{ --pad:16px; --gap:9px; --chip-h:29px; --board-h:300px; }

  .app[data-theme="console"]{
    --bg:#0c0e13; --panel:#13171f; --panel2:#1a1f2a; --line:#252c39; --line2:#323b4b;
    --ink:#e7edf6; --ink-dim:#98a4b6; --ink-faint:#5d6a7e;
    --accent:#56d4e6; --accent-ink:#05181c; --accent-soft:rgba(86,212,230,.13);
    --sel:rgba(86,212,230,.12); --sel-line:#56d4e6;
    --shadow:0 18px 44px rgba(0,0,0,.5);
  }
  .app[data-theme="lofi"]{
    --bg:#ece2d2; --panel:#f6efe3; --panel2:#fbf6ec; --line:#e1d4bf; --line2:#d0bfa3;
    --ink:#3a3026; --ink-dim:#7c6e5b; --ink-faint:#a8987f;
    --accent:#c26d38; --accent-ink:#fff6ec; --accent-soft:rgba(194,109,56,.13);
    --sel:rgba(194,109,56,.11); --sel-line:#c26d38;
    --shadow:0 18px 40px rgba(90,66,38,.16);
  }
  .app[data-theme="clean"]{
    --bg:#eef0f3; --panel:#ffffff; --panel2:#f8fafc; --line:#e7eaef; --line2:#d6dbe2;
    --ink:#1a1e26; --ink-dim:#5b6473; --ink-faint:#99a1ae;
    --accent:#4f63e8; --accent-ink:#ffffff; --accent-soft:rgba(79,99,232,.09);
    --sel:rgba(79,99,232,.08); --sel-line:#4f63e8;
    --shadow:0 16px 38px rgba(30,41,79,.12);
  }
  .app[data-theme="studio"]{
    --bg:#14100b; --panel:#1d1710; --panel2:#251d14; --line:#352a1e; --line2:#473928;
    --ink:#f1e7d7; --ink-dim:#b3a48b; --ink-faint:#7a6b54;
    --accent:#e2a455; --accent-ink:#1a1308; --accent-soft:rgba(226,164,85,.12);
    --sel:rgba(226,164,85,.12); --sel-line:#e2a455;
    --shadow:0 18px 44px rgba(0,0,0,.55);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ background:var(--page-bg,#0c0e13); font-family:'Hanken Grotesk',system-ui,sans-serif; }
  .app{ background:var(--bg); color:var(--ink); min-height:100vh; font-family:var(--font-ui);
        padding:30px clamp(16px,4vw,44px) 90px; transition:background .35s,color .35s; }
  .mono{ font-family:var(--font-mono); }
  ::selection{ background:var(--accent-soft); }

  /* ============================ TOP BAR ============================ */
  .topbar{ display:flex; align-items:flex-end; gap:24px; max-width:1240px; margin:0 auto;
           padding-bottom:16px; border-bottom:1px solid var(--line); }
  .brand{ display:flex; flex-direction:column; gap:5px; }
  .brand-mark{ font-size:25px; font-weight:800; letter-spacing:-.02em; line-height:1; }
  .brand-mark span{ font-weight:400; color:var(--ink-dim); margin-left:5px; }
  .brand-sub{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.22em;
              color:var(--ink-faint); }
  .modes{ display:flex; gap:4px; margin-left:auto; background:var(--panel); padding:4px;
          border-radius:11px; border:1px solid var(--line); }
  .mode-btn{ font-family:var(--font-ui); font-size:13.5px; font-weight:600; color:var(--ink-dim);
             background:transparent; border:none; padding:7px 15px; border-radius:8px; cursor:pointer;
             transition:.16s; }
  .mode-btn:hover{ color:var(--ink); }
  .mode-btn.on{ background:var(--accent); color:var(--accent-ink); }
  .help-btn{ display:inline-flex; align-items:center; gap:6px; font-family:var(--font-ui);
             font-size:12.5px; font-weight:600; color:var(--ink-dim); background:var(--panel);
             border:1px solid var(--line); border-radius:9px; padding:8px 13px; cursor:pointer;
             transition:.15s; white-space:nowrap; }
  .help-btn:hover{ color:var(--ink); border-color:var(--accent); }
  .help-q{ display:grid; place-items:center; width:16px; height:16px; border-radius:50%;
           background:var(--accent); color:var(--accent-ink); font-size:11px; font-weight:800; }
  .lang-toggle{ display:flex; gap:2px; background:var(--panel); border:1px solid var(--line);
                border-radius:9px; padding:3px; }
  .lang-opt{ font-family:var(--font-ui); font-size:12.5px; font-weight:700; color:var(--ink-dim);
             background:transparent; border:none; padding:6px 11px; border-radius:6px; cursor:pointer;
             transition:.15s; min-width:34px; }
  .lang-opt:hover{ color:var(--ink); }
  .lang-opt.on{ background:var(--accent); color:var(--accent-ink); }
  .topstat{ display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .topstat-n{ font-family:var(--font-mono); font-size:22px; font-weight:600; color:var(--ink);
              line-height:1; }
  .topstat-l{ font-size:10.5px; letter-spacing:.06em; color:var(--ink-faint);
              text-transform:uppercase; }

  .mode-hint{ max-width:1240px; margin:13px auto 0; font-size:13px; color:var(--ink-dim); }

  /* ============================ PRESETS ============================ */
  .presets{ max-width:1240px; margin:12px auto 0; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .presets-label{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-dim); margin-right:4px; white-space:nowrap; }
  .preset-btn{ display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px;
    background:var(--panel); border:1px solid var(--line); color:var(--ink); font-size:13px;
    cursor:pointer; transition:all .15s; white-space:nowrap; }
  .preset-btn:hover{ border-color:var(--accent); color:var(--accent); background:rgba(127,212,201,.08); }
  .preset-icon{ font-size:15px; }
  .preset-name{ font-size:12px; }

  /* ============================ REFERENCE CARD ============================ */
  .refcard{ max-width:1240px; margin:16px auto 0; display:flex; gap:18px; align-items:stretch;
            background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
            padding:16px; box-shadow:var(--shadow); }
  .ph{ width:104px; flex:0 0 104px; border-radius:10px; position:relative; overflow:hidden;
       background:
         repeating-linear-gradient(45deg, var(--panel2) 0 7px, var(--line) 7px 14px);
       border:1px solid var(--line2); display:flex; align-items:flex-end; }
  .ph-tag{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:.05em; color:var(--ink-faint);
           background:var(--panel); padding:2px 6px; margin:6px; border-radius:5px; }
  .refcard-body{ flex:1; min-width:0; display:flex; flex-direction:column; gap:5px; }
  .refcard-kicker{ font-family:var(--font-mono); font-size:10px; letter-spacing:.2em;
                   color:var(--accent); }
  .refcard-title{ font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .refcard-sub{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); }
  .refcard-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .refchip{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-dim); white-space:nowrap;
            background:var(--panel2); border:1px solid var(--line); border-radius:7px; padding:4px 8px; }
  .refchip b{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:.06em; color:var(--ink-faint);
              font-weight:600; }
  .refcard-actions{ display:flex; align-items:center; gap:12px; margin-top:auto; padding-top:8px; }
  .refcard-paste-row{ display:flex; gap:8px; margin-bottom:8px; }
  .refcard-paste-input{ flex:1; min-width:0; background:var(--panel2); border:1px solid var(--line2);
                        border-radius:7px; padding:8px 10px; font-family:var(--font-mono); font-size:11.5px;
                        color:var(--ink); outline:none; }
  .refcard-paste-input:focus{ border-color:var(--accent); }
  .refcard-parse-hint{ font-size:11.5px; color:var(--accent); font-weight:600; padding:4px 0 6px; }
  .btn.sm{ padding:6px 12px; font-size:12.5px; white-space:nowrap; }
  .refcard-diff{ font-family:var(--font-mono); font-size:11px; color:var(--accent); }

  /* ============================ MATRIX BOARD ============================ */
  .board{ max-width:1240px; margin:16px auto 0; display:grid; grid-auto-flow:column;
          grid-auto-columns:minmax(146px,1fr); gap:var(--gap); overflow-x:auto;
          padding-bottom:4px; transition:filter .12s; }
  .board.rolling .col:not(.col-prod) .col-body{ filter:blur(.4px); }
  .col{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
        display:flex; flex-direction:column; overflow:hidden; }
  .col-prod{ background:var(--panel2); }
  .col-head{ display:flex; align-items:center; justify-content:space-between; gap:8px;
             padding:11px 12px 9px; border-bottom:1px solid var(--line); }
  .col-headL{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .col-code{ font-family:var(--font-mono); font-size:9.5px; letter-spacing:.14em; color:var(--accent);
             font-weight:600; }
  .col-label{ font-size:13px; font-weight:700; letter-spacing:-.01em; }
  .col-lock{ flex:0 0 auto; display:grid; place-items:center; width:26px; height:26px; border-radius:7px;
             background:transparent; border:1px solid var(--line); color:var(--ink-faint); cursor:pointer;
             transition:.15s; }
  .col-lock:hover{ color:var(--ink-dim); border-color:var(--line2); }
  .col-lock.on{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }
  .col-body{ display:flex; flex-direction:column; gap:4px; padding:8px; overflow-y:auto;
             max-height:var(--board-h); scrollbar-width:thin; }

  .chip{ display:flex; align-items:center; gap:8px; min-height:var(--chip-h); padding:0 9px;
         border-radius:8px; border:1px solid transparent; background:transparent; color:var(--ink-dim);
         font-family:var(--font-ui); font-size:12.5px; text-align:left; cursor:pointer; transition:.13s; }
  .chip:hover{ background:var(--panel2); color:var(--ink); }
  .chip-dot{ width:6px; height:6px; border-radius:50%; flex:0 0 6px; background:var(--line2);
             transition:.13s; }
  .chip-label{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chip-check{ color:var(--accent-ink); display:flex; }
  .chip.sel{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink);
             font-weight:600; }
  .chip.sel .chip-dot{ background:var(--accent-ink); }
  .chip.ref{ border-color:var(--sel-line); background:var(--sel); color:var(--ink); }
  .chip.ref .chip-dot{ background:var(--sel-line); box-shadow:0 0 0 3px var(--accent-soft); }
  .chip-swatch{ width:16px; height:16px; border-radius:5px; flex:0 0 16px;
                border:1px solid rgba(255,255,255,.18); box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .chip.sel .chip-swatch{ border-color:rgba(0,0,0,.25); }

  /* ---- V2: identity layer grouping + visual columns ---- */
  .board-stack{ display:flex; flex-direction:column; gap:18px; margin-top:16px; }
  .board-group{ max-width:1240px; width:100%; margin:0 auto; }
  .board-group .board{ margin-top:8px; }
  .board-group-h{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
                  max-width:1240px; margin:0 auto; padding:0 2px; }
  .bg-label{ font-family:var(--font-mono); font-size:10.5px; font-weight:600; letter-spacing:.2em;
             color:var(--ink-faint); }
  .board-group-visual .bg-label{ color:var(--accent); }
  .bg-hint{ font-size:11.5px; color:var(--ink-faint); }
  .col-visual{ background:var(--panel2); box-shadow:inset 0 2px 0 var(--accent-soft); }
  .col-visual .col-code{ color:var(--accent); }
  .board-stack.rolling .col:not(.col-prod):not(.col-visual) .col-body{ filter:blur(.4px); }

  /* BPM column */
  .col-bpm{ }
  .bpm-body{ gap:10px !important; }
  .bpm-read{ display:flex; align-items:baseline; gap:4px; padding:2px 2px 0; }
  .bpm-num{ font-family:var(--font-mono); font-size:30px; font-weight:600; color:var(--ink); line-height:1; }
  .bpm-unit{ font-family:var(--font-mono); font-size:12px; color:var(--ink-faint); }
  .bpm-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:5px; }
  .bpm-opt{ font-family:var(--font-mono); font-size:13px; padding:8px 0; border-radius:8px;
            border:1px solid var(--line); background:transparent; color:var(--ink-dim); cursor:pointer;
            transition:.13s; }
  .bpm-opt:hover{ color:var(--ink); border-color:var(--line2); }
  .bpm-opt.sel{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); font-weight:600; }
  .bpm-note{ font-family:var(--font-mono); font-size:9.5px; color:var(--ink-faint); letter-spacing:.04em; }

  /* ============================ CONSOLE ============================ */
  .console{ max-width:1240px; margin:16px auto 0; display:flex; align-items:center; gap:20px;
            flex-wrap:wrap; background:var(--panel); border:1px solid var(--line);
            border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
  .console-recipe{ flex:1; min-width:280px; }
  .console-kicker{ display:flex; align-items:center; gap:10px; font-family:var(--font-mono);
                   font-size:10px; letter-spacing:.18em; color:var(--ink-faint); margin-bottom:8px; }
  .console-mut{ letter-spacing:.04em; color:var(--accent); }
  .recipe{ display:flex; flex-wrap:wrap; gap:6px; }
  .rchip{ display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--ink); white-space:nowrap;
          background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:5px 9px; }
  .rchip b{ font-family:var(--font-mono); font-size:9px; letter-spacing:.07em; color:var(--ink-faint);
            font-weight:600; }
  .console-actions{ display:flex; gap:10px; }

  .btn{ display:inline-flex; align-items:center; gap:8px; font-family:var(--font-ui); font-size:13.5px;
        font-weight:600; padding:11px 18px; border-radius:10px; border:1px solid var(--line); cursor:pointer;
        transition:.15s; white-space:nowrap; }
  .btn:disabled{ opacity:.5; cursor:default; }
  .btn-primary{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }
  .btn-primary:not(:disabled):hover{ filter:brightness(1.07); }
  .btn-ghost{ background:transparent; color:var(--ink-dim); }
  .btn-ghost:not(:disabled):hover{ color:var(--ink); border-color:var(--line2); }
  .btn-ghost.sm{ font-size:12px; padding:7px 11px; }

  /* ============================ FEED ============================ */
  .feed{ max-width:1240px; margin:28px auto 0; }
  .feed-head{ display:flex; align-items:center; justify-content:space-between;
              padding-bottom:12px; border-bottom:1px solid var(--line); }
  .feed-title{ font-family:var(--font-mono); font-size:11px; letter-spacing:.2em; color:var(--ink-faint); }
  .feed-clear{ font-family:var(--font-ui); font-size:12px; color:var(--ink-faint); background:none;
               border:none; cursor:pointer; white-space:nowrap; }
  .feed-clear:hover{ color:var(--accent); }
  .empty{ display:flex; flex-direction:column; align-items:center; gap:10px; padding:54px 0;
          color:var(--ink-faint); }
  .empty p{ margin:0; font-size:13.5px; }
  .empty b{ color:var(--ink-dim); }
  .feed-list{ display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:16px;
              margin-top:16px; }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
         padding:16px 17px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:9px; }
  .card-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .card-headL{ display:flex; align-items:center; gap:10px; min-width:0; }
  .card-id{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); letter-spacing:.05em; white-space:nowrap; }
  .card-lineage{ font-family:var(--font-mono); font-size:10px; color:var(--accent);
                 background:var(--accent-soft); padding:2px 7px; border-radius:6px; }
  .card-headR{ display:flex; align-items:center; gap:8px; }
  .status{ display:inline-flex; align-items:center; gap:6px; font-family:var(--font-ui); font-size:11.5px;
           font-weight:600; padding:4px 10px; border-radius:20px; border:1px solid var(--line);
           background:var(--panel2); color:var(--ink-dim); cursor:pointer; }
  .status-dot{ width:6px; height:6px; border-radius:50%; background:var(--ink-faint); }
  .status.s-draft .status-dot{ background:var(--ink-faint); }
  .status.s-approved .status-dot{ background:#e2a455; }
  .status.s-queued .status-dot{ background:#56b6e6; }
  .status.s-published{ color:var(--accent); border-color:var(--accent); }
  .status.s-published .status-dot{ background:var(--accent); }
  .icon-btn{ width:24px; height:24px; border-radius:7px; border:1px solid var(--line); background:transparent;
             color:var(--ink-faint); font-size:16px; line-height:1; cursor:pointer; }
  .icon-btn:hover{ color:var(--ink); border-color:var(--line2); }

  .card-title{ font-size:21px; font-weight:700; letter-spacing:-.015em; }
  .card-title.dim{ color:var(--ink-faint); font-weight:500; font-size:15px; }
  .card-tagline{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-dim); margin-top:-4px; }
  .tags{ display:flex; flex-wrap:wrap; gap:5px; }
  .tag{ display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--ink-dim); white-space:nowrap;
        background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:3px 7px; }
  .tag b{ font-family:var(--font-mono); font-size:8.5px; letter-spacing:.06em; color:var(--ink-faint);
          font-weight:600; }

  .block{ background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:11px 12px;
          display:flex; flex-direction:column; gap:7px; }
  .block-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .block-labels{ display:flex; flex-direction:column; gap:3px; min-width:0; }
  .block-label{ display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
                font-family:var(--font-mono); font-size:10px; letter-spacing:.13em; color:var(--ink-faint); }
  .field-hint{ font-family:var(--font-ui); font-size:10px; font-weight:500; letter-spacing:0;
               color:var(--ink-faint); text-transform:none; }
  .copy{ display:inline-flex; align-items:center; gap:5px; font-family:var(--font-ui); font-size:11px; white-space:nowrap;
         color:var(--ink-dim); background:transparent; border:1px solid var(--line); border-radius:7px;
         padding:4px 9px; cursor:pointer; transition:.13s; }
  .copy:hover{ color:var(--ink); border-color:var(--line2); }
  .copy.done{ color:var(--accent); border-color:var(--accent); }
  .copy.fail{ color:#e06a5a; border-color:#e06a5a; }
  .kv{ display:flex; gap:9px; font-size:13px; line-height:1.5; }
  .kv .k{ flex:0 0 50px; font-family:var(--font-mono); font-size:10px; letter-spacing:.05em;
          color:var(--ink-faint); padding-top:3px; text-transform:uppercase; }
  .kv .v{ flex:1; min-width:0; color:var(--ink); word-break:break-word; }
  .kv .v.mono{ font-family:var(--font-mono); font-size:11.5px; line-height:1.55; }
  .kv .v.dim{ color:var(--ink-dim); }
  .kv .k-sub{ font-size:8.5px; letter-spacing:.04em; color:var(--accent); text-transform:none; }
  .kv-structure{ background:var(--panel2); border:1px solid var(--accent); border-radius:8px;
                 padding:9px 11px; margin:3px 0; }
  .kv-structure .v{ font-size:11px; }

  .sk{ display:flex; flex-direction:column; gap:9px; padding:6px 0; }
  .sk-line{ height:11px; border-radius:6px;

<script>
/* Awen Study — Matrix data, brand defaults, reference sample, fallback prompt engine.
   Plain script: exposes window.AWEN. No build step. */
(function () {
  const DIMS = [
    {
      key: 'environment', label: 'Environment', zh: '环境', code: 'ENV', layer: 'content',
      options: ['Library', 'Rainy Window', 'Cozy Desk', 'Forest Cabin', 'Ocean View',
                'Kyoto Study Room', 'Space Station', 'Night City', 'Mountain Lodge', 'Quiet Café'],
    },
    {
      key: 'nature', label: 'Nature', zh: '自然', code: 'NAT', layer: 'content',
      options: ['Rain', 'Light Snow', 'Soft Wind', 'Ocean Waves', 'Birdsong',
                'Fireplace', 'Distant Thunder', 'Forest Stream', 'Rustling Leaves', 'None'],
    },
    {
      key: 'time', label: 'Time', zh: '时间', code: 'TIME', layer: 'content',
      options: ['Dawn', 'Early Morning', 'Afternoon', 'Golden Hour', 'Dusk',
                'Evening', 'Night', 'Midnight', '3 AM'],
    },
    {
      key: 'mood', label: 'Mood', zh: '情绪', code: 'MOOD', layer: 'content',
      options: ['Calm', 'Cozy', 'Warm', 'Nostalgic', 'Bittersweet',
                'Hopeful', 'Dreamy', 'Focused', 'Lonely'],
    },
    {
      key: 'instrument', label: 'Instrument', zh: '乐器', code: 'INST', layer: 'content',
      options: ['Felt Piano', 'Grand Piano', 'Warm Pad', 'Strings', 'Rhodes',
                'Acoustic Guitar', 'Music Box', 'Vibraphone', 'Cello', 'Harp'],
    },
    {
      key: 'style', label: 'Style', zh: '风格', code: 'STY', layer: 'production',
      options: ['Ambient', 'Neo Classical', 'Lo-fi Hip Hop', 'Chillhop', 'Jazzhop',
                'Minimal Piano', 'Drone Ambient', 'Slowcore'],
    },
    // ---- V2 visual-identity layer: these define the recognizable Awen world.
    //      They are HELD CONSTANT across an album (identity), never part of the
    //      sonic axis, and feed every cover / video / thumbnail prompt. ----
    {
      key: 'character', label: 'Character', zh: '角色', code: 'CHAR', layer: 'visual',
      options: ['Awen', 'Night Student', 'Writer', 'Librarian', 'Traveler',
                'Researcher', 'Dreamer', 'Coffee Drinker', 'Book Collector', 'Silent Observer'],
    },
    {
      key: 'light', label: 'Light Source', zh: '光源', code: 'LIGHT', layer: 'visual',
      options: ['Amber Lamp', 'Morning Sun', 'Rainy Window Glow', 'Candle Light', 'Moonlight',
                'Fireplace', 'Cafe Pendant Light', 'Library Chandelier', 'Train Cabin Light', 'Neon Reflection'],
    },
    {
      key: 'palette', label: 'Color Palette', zh: '色板', code: 'PAL', layer: 'visual',
      options: ['Amber Walnut', 'Rainy Blue', 'Winter Gray', 'Autumn Gold', 'Muted Green',
                'Dusty Rose', 'Night Indigo', 'Coffee Brown', 'Fog White', 'Library Sepia'],
    },
    {
      key: 'motif', label: 'Narrative Motif', zh: '母题', code: 'MOTIF', layer: 'visual',
      options: ['Turning Pages', 'Window Rain', 'Coffee Steam', 'Train Journey', 'Flickering Lamp',
                'Falling Snow', 'Writing Letters', 'Burning Fireplace', 'Distant Thunder', 'Midnight Silence'],
    },
  ];

  const BPM = { key: 'bpm', label: 'BPM', code: 'BPM', layer: 'production',
                values: [55, 58, 60, 62, 65, 68, 70] };

  // Brand-fixed recommendations from the master plan (Calm / Cozy / Warm · Ambient · Felt Piano · 55-70).
  const DEFAULTS = {
    environment: 'Library', nature: 'Rain', time: 'Night',
    mood: 'Calm', instrument: 'Felt Piano', style: 'Ambient', bpm: 60,
    character: 'Awen', light: 'Amber Lamp', palette: 'Amber Walnut', motif: 'Turning Pages',
  };

  const VISUAL_KEYS = ['character', 'light', 'palette', 'motif'];

  /* ===================== TRACK ROLE SYSTEM (V2) =====================
     Every track in an album gets a functional role that injects specific
     sonic modifiers. This gives each track a distinct "purpose" while
     keeping the shared identity locked. Roles are sampled proportionally
     so they work for any track count (3–12). */
  const TRACK_ROLES = [
    { name: 'Awakening',   mod: 'upper-register, lighter harmonics, gentle entry, sparse arrangement' },
    { name: 'Settling In', mod: 'warm and grounding, simple chords, unhurried tempo' },
    { name: 'Focus',       mod: 'fuller voicings, stable harmony, clear melodic line' },
    { name: 'Flow State',  mod: 'seamless groove, minimal variation, deeply hypnotic' },
    { name: 'Reflection',  mod: 'minor-key movement, introspective, softer dynamics' },
    { name: 'Transition',  mod: 'melodic bridge, shifting texture, bittersweet' },
    { name: 'Deep Work',   mod: 'dense and immersive, steady pulse, rich mid-register' },
    { name: 'Persistence', mod: 'resolute, building energy, warm and determined' },
    { name: 'Release',     mod: 'lighter texture, opening up, letting go' },
    { name: 'Closure',     mod: 'returning opening motif, near-silent dynamics, peaceful resolution' },
  ];
  function trackRole(index, total) {
    const pos = total <= 1 ? 0 : index / (total - 1);
    const i = Math.round(pos * (TRACK_ROLES.length - 1));
    return TRACK_ROLES[Math.max(0, Math.min(TRACK_ROLES.length - 1, i))];
  }

  /* ===================== MOTIF RECURRENCE SYSTEM (V2) =====================
     A four-note melodic phrase is auto-derived from the instrument and
     injected into Track 1 (introduce), the midpoint track (variation),
     and the final track (return). This creates album cohesion even when
     the axis moves the harmonic/temporal content around. */
  const MOTIF_PHRASES = {
    'Felt Piano':       'a four-note descending felt piano phrase',
    'Rhodes Piano':     'a four-note Rhodes motif with gentle tremolo',
    'Upright Bass':     'a four-note upright bass ostinato',
    'Classical Guitar': 'a four-note fingerpicked guitar phrase',
    'Violin':           'a four-note violin melodic cell',
    'Cello':            'a four-note cello motif',
    'Vibraphone':       'a four-note vibraphone phrase with soft sustain',
    'Kalimba':          'a four-note kalimba motif',
    'Flute':            'a four-note breathy flute phrase',
    'Harp':             'a four-note harp arpeggio motif',
  };
  function coreMotif(instrument) {
    return MOTIF_PHRASES[instrument] || `a four-note ${(instrument||'piano').toLowerCase()} motif`;
  }

  /* ===================== MUSICAL COHERENCE ENGINE (V2.2) =====================
     Fixes the three quality problems with single tracks:
       1. "incoherent"  → pin a KEY + MODE so harmony stays consistent, and
                          cap the arrangement to 1 lead + 1–2 support instruments
                          (restraint is the source of authentic lo-fi).
       2. "album too bland" → give each track ONE signature element by role.
       3. "flat start to finish" → emit a metatag ARRANGEMENT (Intro→build→
                          breakdown→outro) for Suno's Lyrics box, so the track
                          has an actual arc instead of "continuing the vibe."
     Lo-fi best practice followed throughout: describe groove + texture first;
     avoid "crisp / polished"; keep the Style box tight. */

  // Mood → a musical key + mode that fits the emotion. Minor & modal keys
  // are the backbone of lo-fi; majors used sparingly for warmth/hope.
  const MOOD_KEY = {
    'Calm':       'D dorian',
    'Melancholy': 'A minor',
    'Focused':    'C major',
    'Dreamy':     'F lydian',
    'Nostalgic':  'B♭ major',
    'Hopeful':    'G major',
    'Lonely':     'E minor',
    'Cozy':       'F major',
    'Mysterious': 'C♯ minor',
    'Energetic':  'A minor',
  };
  function musicalKey(mood) { return MOOD_KEY[mood] || 'A minor'; }

  // Each track-role gets ONE signature musical gesture — the memorable hook
  // that keeps an album from feeling samey track to track.
  const ROLE_SIGNATURE = {
    'Awakening':   'opens on a single sustained high note before the theme enters',
    'Settling In': 'a warm upright-bass entrance grounds the groove',
    'Focus':       'a repeating two-note ostinato runs underneath',
    'Flow State':  'one hypnotic looped figure, almost unchanging',
    'Reflection':  'a solo rubato passage, freely played, mid-track',
    'Transition':  'a brief lift to the relative major, then back',
    'Deep Work':   'a quiet counter-melody layered against the lead',
    'Persistence': 'a slowly building rhythmic pulse that never breaks',
    'Release':     'an opening-up to a brighter, more open voicing',
    'Closure':     'the opening phrase returns, finally resolved',
  };
  function roleSignature(role) { return ROLE_SIGNATURE[role] || 'a single memorable melodic phrase anchors the track'; }

  // Build the metatag ARRANGEMENT that goes in Suno's Lyrics box.
  // This is what gives an instrumental a beginning / middle / end.
  // `role` is optional (album tracks pass it); singles use a balanced default.
  function buildArrangement(s, role) {
    const inst = (s.instrument || 'felt piano').toLowerCase();
    const key  = musicalKey(s.mood);
    const tex  = (TEXTURE_MAP[s.style] || 'warm tape texture').split(',')[0].trim();
    const hasDrums = !['Ambient', 'Minimal Piano', 'Drone Ambient'].includes(s.style);
    const drumLine = hasDrums ? 'add soft brushed drums and warm bass, settle the groove' : 'add a low sustained pad beneath, no drums';
    const sig = roleSignature(role || 'Focus');
    return [
      `[Intro: solo ${inst}, sparse, establish the theme in ${key}, ${tex}]`,
      `[Main: ${drumLine}, ${sig}]`,
      `[Lift: slightly fuller arrangement, gentle dynamic rise, stay relaxed]`,
      `[Breakdown: strip back to ${inst} and ${tex}, intimate and quiet]`,
      `[Outro: return to the opening phrase, fade on a long reverb tail]`,
    ].join('\n');
  }

  // The refined, TIGHT Style box. Groove + texture first, key pinned for
  // coherence, instrument count capped, no "polished/crisp" words.
  function buildStyleBox(s, role) {
    const lead = (s.instrument || 'felt piano').toLowerCase();
    const key  = musicalKey(s.mood);
    const groove = s.bpm <= 60 ? 'slow, unhurried groove' : (s.bpm <= 75 ? 'relaxed head-nodding groove' : 'gentle mid-tempo groove');
    return `${s.style.toLowerCase()}, instrumental, ${key}, ${s.bpm} bpm ${groove}, ` +
           `${lead} lead, ${textureTags(s.style)}, warm and unpolished, study-friendly`;
  }

  /* ---- Album DNA: the four semantic locks that give every album a consistent feel ---- */
  const TEXTURE_MAP = {
    'Ambient':         'soft room reverb tail, no drums, airy silence between notes',
    'Neo Classical':   'warm tape hiss, light room reverb, bow-noise texture',
    'Lo-fi Hip Hop':   'soft vinyl dust, gentle tape saturation, lo-fi crackle',
    'Chillhop':        'warm vinyl crackle, soft brushed-drum room, subtle tape hiss',
    'Jazzhop':         'vintage tape saturation, soft drum-brush fizz, warm low-pass',
    'Minimal Piano':   'dry room, soft pedal resonance, sparse silence',
    'Drone Ambient':   'long reverb decay, sub-drone hum, near-silence texture',
    'Slowcore':        'slow tape saturation, soft noise floor, intimate room',
  };
  const SPACE_MAP = {
    'Library':         'small wooden library room with high shelves and soft acoustics',
    'Quiet Café':      'intimate café corner, low ceiling, soft ambient murmur',
    'Home Studio':     'small treated home studio, warm and close',
    'Rainy Window':    'a still room beside a rain-streaked window',
    'Forest Cabin':    'a wooden cabin in the forest, quiet and insulated',
    'Night City':      'a high-floor apartment at night, distant city hum',
    'Rooftop Garden':  'an open rooftop garden, light breeze, soft city below',
    'Old Bookshop':    'a narrow old bookshop, dusty shelves, warm and enclosed',
    'Train Cabin':     'a slow train cabin at night, gentle rhythmic sway',
    'Empty Classroom': 'a quiet empty classroom after hours, wooden floors',
  };
  const EMOTION_MAP = {
    'Calm':       'quiet perseverance',
    'Melancholy': 'gentle melancholy',
    'Focused':    'steady, unbroken focus',
    'Dreamy':     'soft, drifting reverie',
    'Nostalgic':  'bittersweet nostalgia',
    'Hopeful':    'quiet, patient hope',
    'Lonely':     'solitary contemplation',
    'Cozy':       'warm, contented stillness',
    'Mysterious': 'curious, searching wonder',
    'Energetic':  'alert, flowing momentum',
  };
  function albumDNA(base) {
    return {
      motif:   coreMotif(base.instrument),
      texture: TEXTURE_MAP[base.style] || 'warm tape texture, soft room reverb',
      space:   SPACE_MAP[base.environment] || `a ${(base.environment||'library').toLowerCase()} with warm acoustics`,
      emotion: EMOTION_MAP[base.mood] || `${(base.mood||'calm').toLowerCase()} contemplation`,
    };
  }

  /* ===================== SMART DECOMPOSE (V2) =====================
     Parse a free-form style string (or pasted Suno style box) into the
     matrix. Tries to match each dimension's options against the input,
     and snaps BPM to the nearest brand value. Returns null if nothing
     useful was extracted, so the caller can fall back to REFERENCE. */
  function parseStyleString(text) {
    if (!text || typeof text !== 'string') return null;
    const lower = text.toLowerCase();
    const tokens = lower.split(/[,;\n|\u2022\u00b7]+/).map(s => s.trim()).filter(Boolean);
    const out = {};

    // Try to match each dimension's options against any token (substring match both directions).
    for (const dim of DIMS) {
      for (const opt of dim.options) {
        const o = opt.toLowerCase();
        if (tokens.some(t => t.includes(o) || o.includes(t))) {
          out[dim.key] = opt;
          break;
        }
      }
    }
    // BPM: find any number 40-180 and snap to brand values.
    const bpmMatch = lower.match(/\b(\d{2,3})\s*bpm\b/);
    if (bpmMatch) {
      const n = parseInt(bpmMatch[1], 10);
      if (n >= 40 && n <= 200) {
        out.bpm = BPM.values.reduce((b, v) => Math.abs(v - n) < Math.abs(b - n) ? v : b, BPM.values[0]);
      }
    }
    // Heuristics for common phrasing that doesn't map to an option name directly.
    if (!out.nature) {
      if (/\brain\b/.test(lower)) out.nature = 'Rain';
      else if (/\bsnow\b/.test(lower)) out.nature = 'Light Snow';
      else if (/\bfire/.test(lower)) out.nature = 'Fireplace';
      else if (/\bwind/.test(lower)) out.nature = 'Breeze';
    }
    if (!out.time) {
      if (/\bnight\b|\bmidnight\b/.test(lower)) out.time = 'Night';
      else if (/\bmorning\b|\bdawn\b/.test(lower)) out.time = 'Morning';
      else if (/\bevening\b|\bdusk\b/.test(lower)) out.time = 'Evening';
      else if (/\bafternoon\b/.test(lower)) out.time = 'Afternoon';
    }
    return Object.keys(out).length === 0 ? null : out;
  }

  /* ===================== FILE NAMING (V2) =====================
     Build consistent filenames so a folder of downloaded Suno mp3s
     is already organized when it lands on disk. */
  function safeChunk(s) { return String(s || '').replace(/[^A-Za-z0-9]+/g, ''); }
  function songFileName(song) {
    const s = song.sel || {};
    return [
      song.id || 'AWN',
      safeChunk(s.environment), safeChunk(s.time), safeChunk(s.mood),
      safeChunk(s.instrument), (s.bpm ? s.bpm + 'bpm' : '')
    ].filter(Boolean).join('_');
  }
  function albumTrackFileName(album, idx, track) {
    return [
      album.id || 'ALB',
      'T' + String(idx + 1).padStart(2, '0'),
      safeChunk(track.role || ''),
      safeChunk(track.scene || track.title || '')
    ].filter(Boolean).join('_');
  }

  /* ===================== EPISODE TITLE (V2) =====================
     Auto-numbered YouTube title template. Pulls the episode number
     from the item's ID (AWN-042 → 042). */
  function episodeNumber(id) {
    if (!id) return '';
    const m = String(id).match(/(\d+)$/);
    return m ? m[1] : '';
  }
  function songYouTubeTitle(song) {
    const ep = episodeNumber(song.id);
    const s = song.sel || {};
    const ai = song.ai || {};
    const title = ai.title || `${s.environment} ${s.time}`;
    return `EP-${ep} · ${title} · Lo-fi Study Music · ${s.instrument || ''} · Awen`.replace(/ · · /g, ' · ');
  }
  function albumYouTubeTitle(album) {
    const ep = episodeNumber(album.id);
    const data = album.data || {};
    const title = data.album || album.axisLabel || 'Awen Sessions';
    return `EP-${ep} · ${title} · Lo-fi Study Album · Awen`;
  }
  // Returns a motif recurrence instruction for a given track index.
  // null = no instruction (middle tracks).
  function motifInstruction(idx, total, motif) {
    if (total < 3) return null;
    const mid = Math.floor(total / 2);
    if (idx === 0)         return `Introduce ${motif} — let it appear clearly in the opening bars.`;
    if (idx === mid)       return `Subtle variation on ${motif} — same four notes, different register or harmony.`;
    if (idx === total - 1) return `Return of ${motif} from Track 1, resolved — near-silent dynamics, peaceful close.`;
    return null;
  }

  /* ===================== METADATA GENERATOR (V2) =====================
     Builds ready-to-paste YouTube + Spotify descriptions + tags from the
     album object. Saves the copy-paste step when publishing. */
  function metadataGen(album, base) {
    base = base || {};
    const year = new Date().getFullYear();
    const trackList = (album.tracks || []).map((t, i) =>
      `${String(i + 1).padStart(2, '0')}. ${t.title}${t.role ? ' [' + t.role + ']' : ''} (${t.scene})`
    ).join('\n');
    const style = base.style || (album.anchor || 'lo-fi').split(',')[0].trim();
    const mood  = base.mood  || 'calm';
    const env   = base.environment || 'library';
    const inst  = base.instrument  || 'piano';
    const bpm   = base.bpm || '';
    const ytDesc =
      `${album.description || album.concept || ''}\n\n` +
      `▶ TRACKLIST\n${trackList}\n\n` +
      `🎵 All tracks: ${inst} · ${style}${bpm ? ' · ' + bpm + ' bpm' : ''} · no vocals\n` +
      `📌 Study playlist generated with Awen Study Matrix · hiawen.com/music\n\n` +
      `#lofi #studymusic #${style.toLowerCase().replace(/\s+/g,'')} #${mood.toLowerCase()}music #instrumental`;
    const spotifyDesc =
      `${album.description || album.concept || ''}\n\n${trackList}\n\nAwen Study · ${year}`;
    const tags = [
      'lofi study music', 'study with me', 'focus music', 'instrumental',
      style.toLowerCase(), mood.toLowerCase() + ' music',
      env.toLowerCase() + ' ambience', inst.toLowerCase(),
      'no vocals', 'awen study', album.album || ''
    ].filter(Boolean);
    return { ytDesc, spotifyDesc, tags };
  }

  /* ===================== UNIVERSE STORAGE (V2) =====================
     Universes are named identity snapshots saved in localStorage.
     Each album generated under a universe inherits the 4 visual dims
     + environment, so the channel looks like one coherent world. */
  const UNIVERSE_STORE_KEY = 'awen_universes_v1';
  function loadUniverses() {
    try { return JSON.parse(localStorage.getItem(UNIVERSE_STORE_KEY)) || []; } catch (e) { return []; }
  }
  function saveUniversesStore(arr) {
    try { localStorage.setItem(UNIVERSE_STORE_KEY, JSON.stringify(arr)); } catch (e) {}
  }

  /* ===================== V2 VISUAL LANGUAGE ENGINE =====================
     Turns the four visual-identity dimensions into recognizable, reusable
     image language. Every cover / video / thumbnail prompt is assembled from
     these so an Awen album reads as one world even as the music varies. */

  // Two-to-three swatch hexes per palette, for the on-chip color preview.
  const PALETTE_HEX = {
    'Amber Walnut':  ['#3a2a1a', '#8a5a2b', '#d7a85a'],
    'Rainy Blue':    ['#2a3742', '#48626f', '#9fb4bd'],
    'Winter Gray':   ['#3a3f44', '#6b727a', '#c2c7cc'],
    'Autumn Gold':   ['#3a2417', '#a9591f', '#e2b15a'],
    'Muted Green':   ['#23302a', '#4f6b56', '#a7bda6'],
    'Dusty Rose':    ['#3a2730', '#8a5560', '#d8a8ad'],
    'Night Indigo':  ['#1c2138', '#3a4170', '#8189c0'],
    'Coffee Brown':  ['#2a1d16', '#5a3d2b', '#a87f5e'],
    'Fog White':     ['#9aa0a3', '#c9ccce', '#eef0f0'],
    'Library Sepia': ['#3a2f20', '#7a6645', '#cdb98c'],
  };

  const CHARACTER_DESC = {
    'Awen': 'Awen, a young anime-inspired student',
    'Night Student': 'a lone night student',
    'Writer': 'a quiet writer at a desk',
    'Librarian': 'a gentle librarian among the shelves',
    'Traveler': 'a traveler with a worn bag',
    'Researcher': 'a focused researcher surrounded by notes',
    'Dreamer': 'a daydreamer gazing out the window',
    'Coffee Drinker': 'a figure cradling a warm cup',
    'Book Collector': 'a reader behind stacks of books',
    'Silent Observer': 'a still, contemplative figure',
  };
  const LIGHT_DESC = {
    'Amber Lamp': 'warm amber desk-lamp glow',
    'Morning Sun': 'soft morning sunlight',
    'Rainy Window Glow': 'cool grey light through a rain-streaked window',
    'Candle Light': 'flickering candlelight',
    'Moonlight': 'pale blue moonlight',
    'Fireplace': 'warm orange firelight',
    'Cafe Pendant Light': 'low warm café pendant light',
    'Library Chandelier': 'soft library chandelier glow',
    'Train Cabin Light': 'dim train-cabin light',
    'Neon Reflection': 'muted neon reflections',
  };
  const PALETTE_DESC = {
    'Amber Walnut': 'warm walnut & amber palette',
    'Rainy Blue': 'muted rainy-blue palette',
    'Winter Gray': 'cool winter-gray palette',
    'Autumn Gold': 'autumn gold & rust palette',
    'Muted Green': 'muted sage-green palette',
    'Dusty Rose': 'dusty rose & mauve palette',
    'Night Indigo': 'deep night-indigo palette',
    'Coffee Brown': 'rich coffee-brown palette',
    'Fog White': 'soft fog-white palette',
    'Library Sepia': 'aged library-sepia palette',
  };
  // motif → [static cover element, looping video motion]
  const MOTIF_DESC = {
    'Turning Pages': ['an open book mid-turn', 'pages turning gently'],
    'Window Rain': ['a rain-streaked window', 'rain trickling down the glass'],
    'Coffee Steam': ['a cup with rising steam', 'steam curling slowly upward'],
    'Train Journey': ['a train window with passing scenery', 'scenery sliding past the window'],
    'Flickering Lamp': ['a softly glowing lamp', 'a lamp gently flickering'],
    'Falling Snow': ['snow settling outside the window', 'snow drifting down'],
    'Writing Letters': ['a half-written letter and pen', 'a hand writing slowly'],
    'Burning Fireplace': ['a low burning fireplace', 'flames flickering softly'],
    'Distant Thunder': ['a stormy sky beyond the glass', 'distant lightning flickering'],
    'Midnight Silence': ['a still, quiet room at midnight', 'dust motes drifting in still air'],
  };

  // Awen signature elements — Tier 1 always present; Tier 2/3 injected when the
  // recipe makes them true, so covers stay on-brand without feeling templated.
  const SIGNATURE = {
    tier1: ['open book', 'warm lamp', 'wooden surfaces', 'cozy atmosphere'],
    tier2: ['rain', 'coffee', 'paper', 'window'],
    tier3: ['snow', 'train', 'fireplace', 'letters'],
  };
  function signatureElements(s) {
    const out = [...SIGNATURE.tier1];
    const add = (x) => { if (!out.includes(x)) out.push(x); };
    if (s.nature === 'Rain' || s.motif === 'Window Rain' || s.environment === 'Rainy Window') add('rain');
    if (s.character === 'Coffee Drinker' || s.motif === 'Coffee Steam' || s.environment === 'Quiet Café') add('coffee');
    if (s.environment === 'Rainy Window' || s.motif === 'Window Rain' || s.motif === 'Distant Thunder') add('window');
    if (s.nature === 'Light Snow' || s.motif === 'Falling Snow') add('snow');
    if (s.environment === 'Night City' || s.motif === 'Train Journey') add('train');
    if (s.nature === 'Fireplace' || s.motif === 'Burning Fireplace') add('fireplace');
    if (s.motif === 'Writing Letters') add('letters');
    return out;
  }

  const vCharacter = (s) => CHARACTER_DESC[s.character] || (s.character || 'Awen');
  const vLight = (s) => LIGHT_DESC[s.light] || 'warm light';
  const vPalette = (s) => PALETTE_DESC[s.palette] || 'warm palette';
  const vMotif = (s) => MOTIF_DESC[s.motif] || ['an open book', 'soft ambient motion'];

  // Cover Prompt V2 — Character + Environment + Motif + Light + Palette + Camera + Mood
  function coverV2(s) {
    const env = (s.environment || 'library').toLowerCase();
    const [motifEl] = vMotif(s);
    return `Square 1:1 album cover — ${vCharacter(s)} in a ${env}, ${motifEl}, ${vLight(s)}, ${vPalette(s)}. ` +
      `Signature Awen elements: ${signatureElements(s).join(', ')}. ` +
      `Shallow depth of field, cinematic still life, ${(s.mood || 'calm').toLowerCase()} contemplative mood, soft film grain. ` +
      `Centered composition with calm negative space near the top for the album title. No text, no logos, no motion.`;
  }
  // Video Prompt V2 — Environment + Motion + Light + Motif + Palette + Loop instruction
  function videoV2(s) {
    const env = (s.environment || 'library').toLowerCase();
    const [, motion] = vMotif(s);
    return `16:9 seamless looping background — ${motion} in a ${env}, ${vLight(s)}, ${vPalette(s)}, ` +
      `dust particles drifting, very slow cinematic camera drift, shallow depth of field, gentle film grain. ` +
      `Calm and still, no people, perfect loop.`;
  }
  // Channel thumbnail rules — the part that makes a YouTube grid instantly read as Awen.
  function thumbRules(s) {
    return `YouTube thumbnail 1280×720 — keep the Awen channel look identical every time: ${vPalette(s)}, ${vLight(s)}, ` +
      `the same warm desk lamp and open book, Awen wordmark locked to the lower-left, ` +
      `the same rounded title type top-left. ${vCharacter(s)} kept small in frame. Consistent for instant recognition.`;
  }
  // Compact identity snapshot for on-screen readouts.
  function visualDNA(s) {
    return { character: s.character || 'Awen', light: s.light || 'Amber Lamp',
             palette: s.palette || 'Amber Walnut', motif: s.motif || 'Turning Pages' };
  }

  // Imported mainstream lo-fi sample — represented abstractly, only used to seed decompose defaults.
  const REFERENCE = {
    source: 'Spotify', id: '3q7MJsEXF5aDhjOPx8nbaI',
    label: 'Imported reference', sub: 'mainstream lo-fi sample · decomposed',
    decomposed: {
      environment: 'Rainy Window', nature: 'Rain', time: 'Night',
      mood: 'Calm', instrument: 'Felt Piano', style: 'Lo-fi Hip Hop', bpm: 62,
    },
  };

  const CONTENT_KEYS = ['environment', 'nature', 'time', 'mood', 'instrument'];

  function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function randomSelection() {
    const s = {};
    DIMS.forEach(d => { s[d.key] = rand(d.options); });
    s.bpm = rand(BPM.values);
    return s;
  }

  // Count how many dimensions differ from the reference baseline.
  function mutations(sel) {
    let n = 0;
    Object.keys(REFERENCE.decomposed).forEach(k => {
      if (sel[k] !== REFERENCE.decomposed[k]) n++;
    });
    return n;
  }

  // Production/texture tag layer — the part Suno actually responds to.
  // Beat-driven styles get drums + swing; ambient/piano styles stay drumless and airy.
  const BEAT_STYLES = ['Lo-fi Hip Hop', 'Chillhop', 'Jazzhop'];
  function textureTags(style) {
    return BEAT_STYLES.includes(style)
      ? 'soft brushed drums, gentle swing, warm tape saturation, vinyl crackle, sidechained pad, mellow'
      : 'no drums, warm tape saturation, soft room reverb, low-pass filter, airy, intimate';
  }

  // Deterministic fallback prompt engine (used when the AI call fails).
  function fallbackPrompt(s) {
    const natureClause = s.nature === 'None' ? '' : `, ${s.nature.toLowerCase()} ambience`;
    const sceneLight = s.nature === 'None' ? 'soft warm light' : `${s.nature.toLowerCase()} in the scene`;
    const place = s.environment.toLowerCase();
    const titleWords = {
      'Rainy Window': 'Rain on the Glass', 'Library': 'Quiet in the Stacks',
      'Cozy Desk': 'Desk Lamp Hours', 'Forest Cabin': 'Cabin in the Pines',
      'Ocean View': 'Tide Line', 'Kyoto Study Room': 'Paper Screens',
      'Space Station': 'Low Orbit', 'Night City': 'After the Last Train',
      'Mountain Lodge': 'Above the Treeline', 'Quiet Café': 'Corner Table',
    };
    const title = titleWords[s.environment] || `${s.environment} ${s.time}`;
    return {
      title,
      tagline: `${s.mood.toLowerCase()} · ${s.time.toLowerCase()}`,
      suno: {
        style: buildStyleBox(s),
        structure: buildArrangement(s),
        key: musicalKey(s.mood),
        prompt: `Instrumental ${s.style.toLowerCase()} led by ${s.instrument.toLowerCase()}${natureClause}, ${s.mood.toLowerCase()} and study-friendly.`,
        exclude: 'vocals, lyrics, harsh percussion, sudden dynamics, polished, crisp',
      },
      cover: coverV2(s),
      video: videoV2(s),
      thumb: thumbRules(s),
    };
  }

  /* ============================ ALBUM ENGINE ============================
     An album = a FIXED sonic identity (the base recipe) + ONE traversal axis
     that progresses across tracks. Only the axis's "moving" dimension(s) change
     track-to-track; everything else is held constant. That is what makes a set
     of tracks read as a single album instead of a playlist. */

  const ENV_JOURNEY = ['Quiet Café', 'Library', 'Cozy Desk', 'Rainy Window', 'Forest Cabin',
                       'Mountain Lodge', 'Ocean View', 'Kyoto Study Room', 'Night City', 'Space Station'];
  const NATURE_SEASON = ['Birdsong', 'Rustling Leaves', 'Soft Wind', 'Forest Stream', 'Ocean Waves',
                         'Rain', 'Distant Thunder', 'Light Snow', 'Fireplace'];
  const MOOD_ARC = ['Hopeful', 'Warm', 'Cozy', 'Calm', 'Dreamy', 'Nostalgic', 'Bittersweet', 'Lonely'];
  const MOOD_HEAL = ['Lonely', 'Bittersweet', 'Nostalgic', 'Calm', 'Warm', 'Hopeful'];
  const TIME_ARC = ['Dawn', 'Early Morning', 'Afternoon', 'Golden Hour', 'Dusk', 'Evening', 'Night', 'Midnight', '3 AM'];
  const TIME_MORNING = ['Dawn', 'Early Morning', 'Afternoon', 'Golden Hour'];
  const TIME_LATE = ['Evening', 'Night', 'Midnight', '3 AM'];
  const STORM_FRONT = ['Soft Wind', 'Rain', 'Distant Thunder', 'Rain', 'Forest Stream', 'Birdsong'];

  const ALBUM_AXES = [
    { key: 'day',    label: 'Day Arc',          moves: ['time'],
      zh: '时间从清晨走到午夜，一天的完整弧线（最经典）',
      en: 'Time walks from dawn to midnight — a full day arc (classic).', seq: { time: TIME_ARC } },
    { key: 'place',  label: 'Place Journey',    moves: ['environment'],
      zh: '镜头穿过一连串场景空间，像一段漫游',
      en: 'The camera moves through a series of spaces, like a journey.', seq: { environment: ENV_JOURNEY } },
    { key: 'season', label: 'Seasons Turning',  moves: ['nature'],
      zh: '环境氛围从生机流转到深冬',
      en: 'Ambience turns from fresh spring to deep winter.', seq: { nature: NATURE_SEASON } },
    { key: 'morning', label: 'Morning Rise',    moves: ['time', 'bpm', 'mood'], gen: 'morning',
      zh: '清晨到午后，节奏渐快、情绪转向专注——学习开场',
      en: 'Dawn to afternoon: tempo lifts, mood turns toward focus — a study warm-up.' },
    { key: 'focus',  label: 'Focus Session',    moves: ['bpm', 'mood'], gen: 'focus',
      zh: '节奏先升后落、中段进入专注——贴合一次真实学习时段',
      en: 'Tempo rises then falls, focus peaks mid-set — one real study session.' },
    { key: 'latenight', label: 'Late-Night Descent', moves: ['time', 'bpm', 'mood'], gen: 'latenight',
      zh: '黄昏到凌晨三点，节奏渐慢、情绪向内下沉（深夜/失眠）',
      en: 'Evening to 3 AM: tempo slows, mood sinks inward (late night / insomnia).' },
    { key: 'storm',  label: 'Storm Passing',    moves: ['nature', 'mood'], gen: 'storm',
      zh: '一场雨从微风酰酿、到雷雨、再到放晴',
      en: 'One rainstorm: from breeze, to thunder, to clearing skies.' },
    { key: 'mood',   label: 'Mood Drift',       moves: ['mood'],
      zh: '情绪从明亮沿一条曲线渐渐向内漂移',
      en: 'Emotion drifts along a curve from bright to inward.', seq: { mood: MOOD_ARC } },
    { key: 'comfort', label: 'Comfort Arc',     moves: ['mood'],
      zh: '情绪从孤独/苦涩 → 平静 → 温暖，一条向上的修复曲线',
      en: 'From lonely / bittersweet → calm → warm: an upward, healing curve.', seq: { mood: MOOD_HEAL } },
    { key: 'ep',     label: 'Concept EP',       moves: ['nature', 'time'], gen: 'ep',
      zh: '几乎全锁、只做细微变奏（EP 形态，自动限 5 首内）',
      en: 'Almost fully locked, tiny variations only (EP form, capped at 5).' },
  ];

  function sampleSeq(arr, n) {
    if (n <= 1) return [arr[0]];
    const out = [];
    for (let i = 0; i < n; i++) out.push(arr[Math.round(i * (arr.length - 1) / (n - 1))]);
    return out;
  }
  function nearest(arr, target) {
    return arr.reduce((best, v) => Math.abs(v - target) < Math.abs(best - target) ? v : best, arr[0]);
  }
  function rampBpm(n, from, to) {
    const out = [];
    for (let i = 0; i < n; i++) { const p = n > 1 ? i / (n - 1) : 0; out.push(nearest(BPM.values, from + (to - from) * p)); }
    return out;
  }

  // Returns { axis, recipes:[selection…] }. recipes.length === effective track count.
  function buildAlbum(axisKey, base, count) {
    const axis = ALBUM_AXES.find(a => a.key === axisKey) || ALBUM_AXES[0];
    const n = Math.max(3, Math.min(count, axis.maxTracks || count));
    const recipes = [];
    const mk = (over) => Object.assign({}, base, over);

    if (axis.gen === 'focus') { // BPM rises then falls, mood deepens mid-set
      for (let i = 0; i < n; i++) {
        const pos = n > 1 ? i / (n - 1) : 0;
        const tri = 1 - Math.abs(0.5 - pos) * 2;
        recipes.push(mk({ bpm: nearest(BPM.values, 55 + tri * (68 - 55)),
                          mood: (pos > 0.28 && pos < 0.72) ? 'Focused' : base.mood }));
      }
    } else if (axis.gen === 'morning') { // dawn→afternoon, energy rising, hopeful→focused
      const tseq = sampleSeq(TIME_MORNING, n), bseq = rampBpm(n, 55, 68);
      for (let i = 0; i < n; i++) {
        const pos = n > 1 ? i / (n - 1) : 0;
        recipes.push(mk({ time: tseq[i], bpm: bseq[i], mood: pos < 0.5 ? 'Hopeful' : 'Focused' }));
      }
    } else if (axis.gen === 'latenight') { // evening→3am, slowing, drifting inward
      const tseq = sampleSeq(TIME_LATE, n), bseq = rampBpm(n, 65, 55),
            mseq = sampleSeq(['Calm', 'Dreamy', 'Nostalgic', 'Lonely'], n);
      for (let i = 0; i < n; i++) recipes.push(mk({ time: tseq[i], bpm: bseq[i], mood: mseq[i] }));
    } else if (axis.gen === 'storm') { // weather front building then clearing
      const nseq = sampleSeq(STORM_FRONT, n);
      for (let i = 0; i < n; i++) {
        const pos = n > 1 ? i / (n - 1) : 0;
        recipes.push(mk({ nature: nseq[i], mood: (pos > 0.3 && pos < 0.6) ? 'Bittersweet' : base.mood }));
      }
    } else if (axis.gen === 'ep') { // near-static micro-variation
      const nseq = sampleSeq(NATURE_SEASON.slice(4), n), tseq = sampleSeq(TIME_LATE, n);
      for (let i = 0; i < n; i++) recipes.push(mk({ nature: nseq[i], time: tseq[i] }));
    } else { // single-dimension sequence (day / place / season / mood / comfort)
      const dim = axis.moves[0], seq = sampleSeq(axis.seq[dim], n);
      for (let i = 0; i < n; i++) recipes.push(mk({ [dim]: seq[i] }));
    }
    return { axis, recipes };
  }

  // Which dims are held constant (the "anchor") for a given axis.
  function anchorDims(axisKey) {
    const axis = ALBUM_AXES.find(a => a.key === axisKey) || ALBUM_AXES[0];
    const moving = new Set(axis.moves);
    return ['style', 'instrument', 'environment', 'nature', 'time', 'mood', 'bpm']
      .filter(k => !moving.has(k));
  }

  // Offline album fallback (used when AI is off/fails). Includes liner-note description.
  function fallbackAlbum(axisKey, base, recipes) {
    const axis = ALBUM_AXES.find(a => a.key === axisKey) || ALBUM_AXES[0];
    const titles = {
      day: 'Hours', place: 'Passages', season: 'Turning', focus: 'Deep Work',
      mood: 'Undercurrents', comfort: 'Coming Home', morning: 'First Light',
      latenight: 'Small Hours', storm: 'The Passing Rain', ep: 'Quiet Set',
    };
    const albumTitle = `${base.environment} ${titles[axisKey] || 'Sessions'}`;
    const anchor = `${base.style}, ${base.mood.toLowerCase()} lo-fi, ${base.instrument.toLowerCase()}, ${base.bpm} bpm range, ${textureTags(base.style)}, instrumental`;
    const motif = coreMotif(base.instrument);
    const tracks = recipes.map((s, idx) => {
      const moveLabels = axis.moves.map(k => k === 'bpm' ? s.bpm + ' bpm' : s[k]).join(' · ');
      const role = trackRole(idx, recipes.length);
      const motifInstr = motifInstruction(idx, recipes.length, motif);
      return {
        title: `${moveLabels}`,
        scene: `${s.time} · ${s.environment}`,
        role: role.name,
        key: musicalKey(s.mood),
        style: buildStyleBox(s, role.name),
        structure: buildArrangement(s, role.name),
        motifMark: idx === 0 ? 'intro' : idx === Math.floor(recipes.length/2) ? 'variation' : idx === recipes.length-1 ? 'return' : null,
        prompt: `${axis.moves.includes('bpm') ? s.bpm + ' bpm, ' : ''}${s.mood.toLowerCase()} ${s.style.toLowerCase()} in a ${s.environment.toLowerCase()} at ${s.time.toLowerCase()}${s.nature === 'None' ? '' : ', ' + s.nature.toLowerCase() + ' ambience'}. Role: ${role.name} — ${role.mod}. ${roleSignature(role.name)}.${motifInstr ? ' ' + motifInstr : ''}`,
      };
    });
    const firstT = recipes[0], lastT = recipes[recipes.length - 1];
    const description =
      `Built from a single ${base.instrument.toLowerCase()} identity recorded in a ${base.environment.toLowerCase()}, ` +
      `${recipes.length} instrumental tracks follow one ${axis.label.toLowerCase()}. ` +
      `It opens with “${tracks[0].title}” and closes on “${tracks[tracks.length - 1].title}”, ` +
      `holding the same warm tape texture and ${base.bpm} bpm pulse throughout — made for long, uninterrupted study.`;
    const descriptionZh =
      `以一段在 ${base.environment} 里的 ${base.instrument} 为核心，${recipes.length} 首纯器乐沿着「${axis.label}」展开，` +
      `从「${tracks[0].title}」开始，在「${tracks[tracks.length - 1].title}」收束，` +
      `全程维持同样温暖的磁带质感与 ${base.bpm} 左右的脉动——为长时间不被打断的学习而作。`;
    return {
      album: albumTitle,
      concept: `${recipes.length} instrumental tracks · ${axis.label.toLowerCase()} · one ${base.instrument.toLowerCase()} identity held throughout`,
      description,
      descriptionZh,
      anchor,
      coreMotif: motif,
      dna: albumDNA(base),
      visual: visualDNA(base),
      cover: coverV2(base),
      video: videoV2(base),
      thumb: thumbRules(base),
      tracks,
    };
  }

  const PRESETS = [
    { key: 'deep-focus', icon: '🎯', label: 'Deep Focus', zh: '深度专注',
      sel: { environment: 'Library', nature: 'Rain', time: 'Night', mood: 'Focused', instrument: 'Felt Piano', style: 'Ambient', bpm: 60 } },
    { key: 'morning-coffee', icon: '☕', label: 'Morning Coffee', zh: '晨间咖啡',
      sel: { environment: 'Cozy Desk', nature: 'Birdsong', time: 'Early Morning', mood: 'Warm', instrument: 'Acoustic Guitar', style: 'Lo-fi Hip Hop', bpm: 72 } },
    { key: 'rainy-day', icon: '🌧', label: 'Rainy Day', zh: '雨天发呆',
      sel: { environment: 'Rainy Window', nature: 'Rain', time: 'Afternoon', mood: 'Nostalgic', instrument: 'Rhodes', style: 'Chillhop', bpm: 68 } },
    { key: 'late-night', icon: '🌙', label: 'Late Night', zh: '深夜独处',
      sel: { environment: 'Night City', nature: 'Light Snow', time: 'Midnight', mood: 'Lonely', instrument: 'Warm Pad', style: 'Drone Ambient', bpm: 55 } },
    { key: 'forest-escape', icon: '🌲', label: 'Forest Escape', zh: '森林逃离',
      sel: { environment: 'Forest Cabin', nature: 'Forest Stream', time: 'Golden Hour', mood: 'Calm', instrument: 'Acoustic Guitar', style: 'Neo Classical', bpm: 62 } },
    { key: 'dreamy-dusk', icon: '🌅', label: 'Dreamy Dusk', zh: '黄昏入梦',
      sel: { environment: 'Ocean View', nature: 'Ocean Waves', time: 'Dusk', mood: 'Dreamy', instrument: 'Harp', style: 'Ambient', bpm: 58 } },
    { key: 'cozy-winter', icon: '🔥', label: 'Cozy Winter', zh: '冬日壁炉',
      sel: { environment: 'Mountain Lodge', nature: 'Fireplace', time: 'Evening', mood: 'Cozy', instrument: 'Cello', style: 'Minimal Piano', bpm: 58 } },
    { key: 'zen-garden', icon: '🍃', label: 'Zen Garden', zh: '禅意庭院',
      sel: { environment: 'Kyoto Study Room', nature: 'Rustling Leaves', time: 'Dawn', mood: 'Calm', instrument: 'Music Box', style: 'Ambient', bpm: 55 } },
  ];

  window.AWEN = {
    DIMS, BPM, DEFAULTS, REFERENCE, CONTENT_KEYS, PRESETS, VISUAL_KEYS,
    randomSelection, mutations, fallbackPrompt, rand,
    ALBUM_AXES, buildAlbum, anchorDims, fallbackAlbum,
    PALETTE_HEX, SIGNATURE, signatureElements,
    coverV2, videoV2, thumbRules, visualDNA,
    TRACK_ROLES, trackRole, coreMotif, motifInstruction, albumDNA, metadataGen,
    musicalKey, roleSignature, buildArrangement, buildStyleBox,
    parseStyleString, songFileName, albumTrackFileName, songYouTubeTitle, albumYouTubeTitle, episodeNumber,
    loadUniverses, saveUniversesStore,
  };
})();
